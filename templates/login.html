{% extends "base.html" %}

{% block title %}Sign In - MediPredict AI{% endblock %}

{% block content %}
<section class="py-5 d-flex align-items-center" style="min-vh-100;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-lg border-light rounded-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-lock text-primary fs-2 mb-2"></i>
                        <h3 class="fw-bold">Sign In</h3>
                        <p class="text-secondary small">Access your patient screening panel</p>
                    </div>
                    
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-secondary"></i></span>
                                <input type="text" class="form-control border-start-0 bg-light" id="username" name="username" required placeholder="Enter username or email">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" required placeholder="••••••••">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary rounded-pill w-100 py-2.5 text-white mb-3">
                            Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                        </button>
                    </form>
                    
                    <div class="text-center border-top pt-3 border-light-subtle">
                        <small class="text-secondary">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-semibold">Register here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
