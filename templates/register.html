{% extends "base.html" %}

{% block title %}Create Account - MediPredict AI{% endblock %}

{% block content %}
<section class="py-5 d-flex align-items-center" style="min-vh-100;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-lg border-light rounded-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-plus text-primary fs-2 mb-2"></i>
                        <h3 class="fw-bold">Create Account</h3>
                        <p class="text-secondary small">Register to record and review health predictions</p>
                    </div>
                    
                    <form action="{{ url_for('register') }}" method="POST" onsubmit="return validateRegisterForm()">
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-secondary"></i></span>
                                <input type="text" class="form-control border-start-0 bg-light" id="username" name="username" required minlength="4" placeholder="Choose a username">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-secondary"></i></span>
                                <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" required placeholder="name@domain.com">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label small fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-shield-halved text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="confirm_password" name="confirm_password" required placeholder="Repeat password">
                            </div>
                            <div id="password-match-error" class="text-danger small mt-1 d-none">Passwords do not match.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary rounded-pill w-100 py-2.5 text-white mb-3">
                            Register <i class="fa-solid fa-user-check ms-1"></i>
                        </button>
                    </form>
                    
                    <div class="text-center border-top pt-3 border-light-subtle">
                        <small class="text-secondary">Already have an account? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-semibold">Sign in here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
function validateRegisterForm() {
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirm_password").value;
    var errorDiv = document.getElementById("password-match-error");
    
    if (password !== confirmPassword) {
        errorDiv.classList.remove("d-none");
        return false;
    }
    errorDiv.classList.add("d-none");
    return true;
}
</script>
{% endblock %}
